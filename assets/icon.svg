<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="C++ code snippet icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2A47"/>
      <stop offset="55%" stop-color="#1B4F8B"/>
      <stop offset="100%" stop-color="#3D7DD5"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D9E7F7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Rounded square plate -->
  <rect x="24" y="24" width="464" height="464" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="96" ry="96" fill="none" stroke="#7FB3FF" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Subtle code line backdrop -->
  <g opacity="0.18" stroke="#9EC5FF" stroke-width="10" stroke-linecap="round">
    <line x1="120" y1="150" x2="240" y2="150"/>
    <line x1="160" y1="200" x2="330" y2="200"/>
    <line x1="120" y1="362" x2="290" y2="362"/>
    <line x1="160" y1="412" x2="360" y2="412"/>
  </g>

  <!-- Data dots (CSV hint) -->
  <g fill="#9EC5FF">
    <circle cx="396" cy="150" r="9"/>
    <circle cx="378" cy="200" r="6" opacity="0.7"/>
  </g>

  <!-- Left bracket -->
  <path d="M 200 150
           C 168 150, 158 168, 158 200
           L 158 220
           C 158 240, 144 244, 128 248
           C 144 252, 158 256, 158 276
           L 158 312
           C 158 344, 168 362, 200 362"
        fill="none" stroke="url(#bracket)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slash -->
  <line x1="288" y1="120" x2="224" y2="392" stroke="url(#bracket)" stroke-width="28" stroke-linecap="round"/>

  <!-- Right bracket -->
  <path d="M 312 150
           C 344 150, 354 168, 354 200
           L 354 220
           C 354 240, 368 244, 384 248
           C 368 252, 354 256, 354 276
           L 354 312
           C 354 344, 344 362, 312 362"
        fill="none" stroke="url(#bracket)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Soft glow under brackets -->
  <ellipse cx="256" cy="266" rx="180" ry="40" fill="#7FB3FF" opacity="0.15" filter="url(#soft)"/>
</svg>
